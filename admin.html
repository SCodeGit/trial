<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SCode OS</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing: border-box;
}

body{
  margin:0;
  font-family:"Segoe UI", sans-serif;

  /* BRIGHT MODERN BG */
  background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
  color:white;
}

/* DESKTOP */
.desktop{
  width:100%;
  min-height:100vh;
  position:relative;
}

/* TOP BAR */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  height:50px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);

  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* SEARCH */
.search{
  margin-top:70px;
  display:flex;
  justify-content:center;
  padding:0 15px;
}

.search input{
  width:100%;
  max-width:400px;
  padding:12px 16px;
  border-radius:25px;
  border:none;
  outline:none;

  background: rgba(255,255,255,0.12);
  color:white;
}

/* WINDOW */
.window{
  margin:20px auto;
  width:95%;
  max-width:800px;

  border-radius:18px;
  overflow:hidden;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);

  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

/* HEADER */
.window-header{
  padding:12px;
  font-weight:600;
  background: rgba(255,255,255,0.08);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* CONTENT */
.window-content{
  padding:15px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(120px,1fr));
  gap:12px;
}

.card{
  padding:15px;
  border-radius:14px;

  background: rgba(255,255,255,0.12);
  text-align:center;

  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
}

.value{
  font-size:24px;
  font-weight:700;
}

/* FILE EXPLORER */
.file-item{
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;

  background: rgba(255,255,255,0.12);

  display:flex;
  justify-content:space-between;
  align-items:center;

  cursor:pointer;
  transition:0.2s;
}

.file-item:hover{
  background: rgba(255,255,255,0.2);
}

.file-name{
  font-size:14px;
}

.file-open{
  font-size:12px;
  opacity:0.8;
}

/* DOCK */
.dock{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);

  display:flex;
  gap:12px;
  padding:10px 14px;

  background: rgba(255,255,255,0.1);
  border-radius:20px;

  backdrop-filter: blur(12px);
}

/* ICON */
.icon{
  width:45px;
  height:45px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:12px;

  background: rgba(255,255,255,0.15);
  font-size:20px;

  cursor:pointer;
  transition:0.2s;
}

.icon:hover{
  transform:scale(1.1);
  background: rgba(255,255,255,0.25);
}

/* MOBILE TWEAKS */
@media (max-width:500px){

  .value{
    font-size:20px;
  }

  .window{
    margin-top:10px;
  }

}
</style>
</head>

<body>

<div class="desktop">

  <!-- TOP BAR -->
  <div class="topbar">
    <div>🚀 SCode OS</div>
    <div id="time"></div>
  </div>

  <!-- SEARCH -->
  <div class="search">
    <input type="text" placeholder="Search system...">
  </div>

  <!-- WINDOW -->
  <div class="window">
    <div class="window-header">📊 Dashboard</div>

    <div class="window-content">

      <!-- DASHBOARD -->
      <div id="dashboardApp">
        <div class="grid">
          <div class="card">
            <div>Total PDFs</div>
            <div class="value" id="pdfCount">0</div>
          </div>

          <div class="card">
            <div>Status</div>
            <div class="value">Active</div>
          </div>

          <div class="card">
            <div>Repository</div>
            <div class="value">trial</div>
          </div>
        </div>
      </div>

      <!-- FILE EXPLORER -->
      <div id="filesApp" style="display:none;">
        <input 
          type="text" 
          id="fileSearch" 
          placeholder="Search PDFs..." 
          style="width:100%; padding:10px; border-radius:10px; border:none; margin-bottom:10px;"
        >
        <div id="fileList"></div>
      </div>

    </div>
  </div>

  <!-- DOCK -->
  <div class="dock">
    <div class="icon" onclick="openApp('dashboard')">📊</div>
    <div class="icon" onclick="openApp('files')">📂</div>
    <div class="icon">⚙️</div>
    <div class="icon">☁️</div>
  </div>

</div>

<script>
/* CLOCK */
function updateTime(){
  document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

/* CONFIG */
const owner = "SCodeGit";
const repo  = "trial";

let allFiles = [];

/* FETCH FILES */
async function fetchFiles() {
  try {
    const url = `https://api.github.com/repos/${owner}/${repo}/git/trees/main?recursive=1`;
    const res = await fetch(url);
    const data = await res.json();

    let pdfs = [];

    data.tree.forEach(item=>{
      if(item.path.toLowerCase().endsWith(".pdf")){
        pdfs.push({
          name: item.path.split("/").pop(),
          path: item.path,
          url: `https://raw.githubusercontent.com/${owner}/${repo}/main/${item.path}`
        });
      }
    });

    allFiles = pdfs;
    document.getElementById("pdfCount").innerText = pdfs.length;

    renderFiles(pdfs);

  } catch {
    document.getElementById("pdfCount").innerText = "Error";
  }
}

/* RENDER FILES */
function renderFiles(files){
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  files.forEach(file=>{
    const div = document.createElement("div");
    div.className = "file-item";

    div.innerHTML = `
      <div class="file-name">📄 ${file.name}</div>
      <div class="file-open">Open</div>
    `;

    div.onclick = () => window.open(file.url, "_blank");

    list.appendChild(div);
  });
}

/* SEARCH */
document.addEventListener("input", e=>{
  if(e.target.id === "fileSearch"){
    const value = e.target.value.toLowerCase();
    const filtered = allFiles.filter(f =>
      f.name.toLowerCase().includes(value)
    );
    renderFiles(filtered);
  }
});

/* SWITCH APPS */
function openApp(app){
  document.getElementById("dashboardApp").style.display = "none";
  document.getElementById("filesApp").style.display = "none";

  const header = document.querySelector(".window-header");

  if(app==="dashboard"){
    header.innerText = "📊 Dashboard";
    document.getElementById("dashboardApp").style.display = "block";
  }

  if(app==="files"){
    header.innerText = "📂 File Explorer";
    document.getElementById("filesApp").style.display = "block";
  }
}

/* LOAD */
fetchFiles();
</script>

</body>
</html>

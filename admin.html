<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SCode OS</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #0a0f2c, #020617);
  overflow:hidden;
}

/* DESKTOP */
.desktop{
  width:100vw;
  height:100vh;
  position:relative;
}

/* TOP BAR */
.topbar{
  position:absolute;
  top:0;
  width:100%;
  height:40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
  background: rgba(0,0,0,0.4);
  color:white;
  backdrop-filter: blur(10px);
}

/* SEARCH */
.search{
  position:absolute;
  top:55px;
  left:50%;
  transform:translateX(-50%);
}
.search input{
  width:300px;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
  background: rgba(255,255,255,0.1);
  color:white;
}

/* WINDOW */
.window{
  position:absolute;
  top:100px;
  left:50%;
  transform:translateX(-50%);
  width:750px;
  border-radius:16px;
  overflow:hidden;
  background: rgba(20,30,80,0.5);
  backdrop-filter: blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 30px rgba(0,150,255,0.3);
}

/* HEADER */
.window-header{
  padding:10px;
  background: rgba(0,0,0,0.3);
  color:#eaf2ff;
  font-weight:600;
}

/* CONTENT */
.window-content{
  padding:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap:15px;
}

.card{
  padding:15px;
  border-radius:12px;
  background: rgba(255,255,255,0.05);
  text-align:center;
}

.value{
  font-size:28px;
  color:#fff;
}

/* FILE EXPLORER */
.file-item{
  padding:10px;
  margin-bottom:8px;
  border-radius:10px;
  background: rgba(255,255,255,0.06);
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.file-item:hover{
  background: rgba(0,150,255,0.3);
}

.file-name{
  color:#fff;
}

.file-open{
  font-size:12px;
  color:#9ecbff;
}

/* DOCK */
.dock{
  position:absolute;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:15px;
  padding:10px 15px;
  background: rgba(0,0,0,0.4);
  border-radius:20px;
}

.icon{
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  background: rgba(255,255,255,0.08);
  color:white;
  font-size:22px;
  cursor:pointer;
  transition:0.3s;
}

.icon:hover{
  transform:scale(1.2);
  background: rgba(0,150,255,0.5);
}
</style>
</head>

<body>

<div class="desktop">

  <!-- TOP BAR -->
  <div class="topbar">
    <div>🚀 SCode OS</div>
    <div id="time"></div>
  </div>

  <!-- SEARCH -->
  <div class="search">
    <input type="text" placeholder="Search system...">
  </div>

  <!-- WINDOW -->
  <div class="window">
    <div class="window-header">📊 Dashboard</div>

    <div class="window-content" id="appContent">

      <!-- DASHBOARD -->
      <div id="dashboardApp">
        <div class="grid">
          <div class="card">
            <div>Total PDFs</div>
            <div class="value" id="pdfCount">0</div>
          </div>

          <div class="card">
            <div>Status</div>
            <div class="value">Active</div>
          </div>

          <div class="card">
            <div>Repository</div>
            <div class="value">trial</div>
          </div>
        </div>
      </div>

      <!-- FILE EXPLORER -->
      <div id="filesApp" style="display:none;">
        <input 
          type="text" 
          id="fileSearch" 
          placeholder="Search PDFs..." 
          style="width:100%; padding:10px; margin-bottom:15px; border-radius:10px; border:none;"
        >
        <div id="fileList"></div>
      </div>

    </div>
  </div>

  <!-- DOCK -->
  <div class="dock">
    <div class="icon" onclick="openApp('dashboard')">📊</div>
    <div class="icon" onclick="openApp('files')">📂</div>
    <div class="icon">⚙️</div>
    <div class="icon">☁️</div>
  </div>

</div>

<script>
/* CLOCK */
function updateTime(){
  document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

/* CONFIG */
const owner = "SCodeGit";
const repo  = "trial";

let allFiles = [];

/* FETCH FILES */
async function fetchFiles() {
  try {
    const url = `https://api.github.com/repos/${owner}/${repo}/git/trees/main?recursive=1`;
    const res = await fetch(url);
    const data = await res.json();

    let pdfs = [];

    data.tree.forEach(item=>{
      if(item.path.toLowerCase().endsWith(".pdf")){
        pdfs.push({
          name: item.path.split("/").pop(),
          path: item.path,
          url: `https://raw.githubusercontent.com/${owner}/${repo}/main/${item.path}`
        });
      }
    });

    allFiles = pdfs;
    document.getElementById("pdfCount").innerText = pdfs.length;

    renderFiles(pdfs);

  } catch {
    document.getElementById("pdfCount").innerText = "Error";
  }
}

/* RENDER FILES */
function renderFiles(files){
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  files.forEach(file=>{
    const div = document.createElement("div");
    div.className = "file-item";

    div.innerHTML = `
      <div class="file-name">📄 ${file.name}</div>
      <div class="file-open">Open</div>
    `;

    div.onclick = () => window.open(file.url, "_blank");

    list.appendChild(div);
  });
}

/* SEARCH */
document.addEventListener("input", e=>{
  if(e.target.id === "fileSearch"){
    const value = e.target.value.toLowerCase();
    const filtered = allFiles.filter(f =>
      f.name.toLowerCase().includes(value)
    );
    renderFiles(filtered);
  }
});

/* SWITCH APPS */
function openApp(app){
  document.getElementById("dashboardApp").style.display = "none";
  document.getElementById("filesApp").style.display = "none";

  const header = document.querySelector(".window-header");

  if(app==="dashboard"){
    header.innerText = "📊 Dashboard";
    document.getElementById("dashboardApp").style.display = "block";
  }

  if(app==="files"){
    header.innerText = "📂 File Explorer";
    document.getElementById("filesApp").style.display = "block";
  }
}

/* LOAD */
fetchFiles();
</script>

</body>
</html>

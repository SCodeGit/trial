<!-- ======== SCODE DASHBOARD PDF SYSTEM ======== -->
<style>
body{
  background: radial-gradient(circle at top, #0a0f2c, #020617);
  font-family: "Segoe UI", sans-serif;
}

/* MAIN DASHBOARD */
.scode-dashboard{
  width: 95%;
  max-width: 1100px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 22px;

  background: rgba(20,30,80,0.45);
  backdrop-filter: blur(20px);

  box-shadow: 0 0 40px rgba(0,150,255,0.25);
  border: 1px solid rgba(255,255,255,0.1);
}

/* HEADER */
.scode-header{
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.scode-title{
  font-size: 26px;
  font-weight: 700;
  color: #eaf2ff;
  text-shadow: 0 0 10px #0077ff;
}

.scode-status{
  font-size: 12px;
  color: #9ecbff;
  opacity: 0.8;
}

/* GRID */
.scode-grid{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

/* CARD GADGET */
.scode-card{
  padding: 20px;
  border-radius: 16px;

  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);

  box-shadow: inset 0 0 20px rgba(0,90,255,0.2);
  transition: 0.3s;
}

.scode-card:hover{
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 0 30px rgba(0,150,255,0.4);
}

.card-title{
  font-size: 14px;
  color: #9ecbff;
  margin-bottom: 8px;
}

.card-value{
  font-size: 36px;
  font-weight: 800;
  color: #fff;
  text-shadow: 0 0 10px #4da6ff;
}

/* DOCK */
.scode-dock{
  margin-top: 30px;
  padding: 15px;
  display: flex;
  justify-content: center;
  gap: 18px;

  background: rgba(0,0,0,0.3);
  border-radius: 18px;

  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

/* DOCK ICON */
.dock-item{
  width: 55px;
  height: 55px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;

  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 22px;

  transition: 0.3s;
  cursor: pointer;
}

.dock-item:hover{
  transform: scale(1.2);
  background: rgba(0,150,255,0.4);
  box-shadow: 0 0 20px #0077ff;
}

/* ANIMATION */
@keyframes fadeUp{
  from{opacity:0; transform: translateY(20px);}
  to{opacity:1; transform: translateY(0);}
}

.scode-dashboard{
  animation: fadeUp 0.8s ease;
}
</style>

<div class="scode-dashboard">

  <!-- HEADER -->
  <div class="scode-header">
    <div class="scode-title">🚀 SCode Control Panel</div>
    <div class="scode-status">Live System • GitHub Sync</div>
  </div>

  <!-- GRID GADGETS -->
  <div class="scode-grid">

    <!-- PDF COUNT -->
    <div class="scode-card">
      <div class="card-title">Total PDFs</div>
      <div class="card-value" id="pdfCount">0</div>
    </div>

    <!-- EXTRA GADGET -->
    <div class="scode-card">
      <div class="card-title">System Status</div>
      <div class="card-value">Active</div>
    </div>

    <!-- EXTRA GADGET -->
    <div class="scode-card">
      <div class="card-title">Uploads Today</div>
      <div class="card-value">--</div>
    </div>

    <!-- EXTRA GADGET -->
    <div class="scode-card">
      <div class="card-title">Repository</div>
      <div class="card-value">trial</div>
    </div>

  </div>

  <!-- DOCK -->
  <div class="scode-dock">
    <div class="dock-item">📂</div>
    <div class="dock-item">📄</div>
    <div class="dock-item">📊</div>
    <div class="dock-item">⚙️</div>
    <div class="dock-item">☁️</div>
  </div>

</div>

<script>
const owner = "SCodeGit";
const repo  = "trial";

async function fetchPDFCount() {
  try {
    const url = `https://api.github.com/repos/${owner}/${repo}/git/trees/main?recursive=1`;
    const response = await fetch(url);
    const data = await response.json();

    let total = 0;
    for (const item of data.tree) {
      if (item.path.toLowerCase().endsWith(".pdf")) total++;
    }

    animateCount(total);

  } catch (e) {
    document.getElementById("pdfCount").innerText = "Error";
  }
}

function animateCount(target) {
  let current = 0;
  const step = Math.ceil(target / 40);

  const counter = setInterval(() => {
    current += step;
    if(current >= target){
      current = target;
      clearInterval(counter);
    }
    document.getElementById("pdfCount").innerText = current;
  }, 25);
}

fetchPDFCount();
</script>
<!-- ======== END SCODE DASHBOARD ======== -->
